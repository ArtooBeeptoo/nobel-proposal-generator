<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Nobel Biocare Proposal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <img src="https://www.nobelbiocare.com/themes/custom/nobel/logo-small.svg" alt="Nobel Biocare" class="logo">
            <h1>Proposal Tool</h1>
            <p style="font-size: 12px; color: #666; margin-bottom: 1rem;">Internal sales productivity tool for authorized representatives.</p>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }}" style="margin-bottom: 1rem;">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}
            
            <form method="POST">
                <input type="password" name="password" placeholder="Enter password" required autofocus>
                <button type="submit" class="btn btn-primary">Login</button>
            </form>
        </div>
    </div>
</body>
</html>
